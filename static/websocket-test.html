<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WebSocket Topic Test</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 800px;
				margin: 50px auto;
				padding: 20px;
			}
			.container {
				display: flex;
				gap: 20px;
				margin-bottom: 20px;
			}
			.section {
				flex: 1;
				border: 1px solid #ccc;
				padding: 15px;
				border-radius: 5px;
			}
			button {
				background: #007bff;
				color: white;
				border: none;
				padding: 8px 16px;
				border-radius: 4px;
				cursor: pointer;
				margin: 5px;
			}
			button:hover {
				background: #0056b3;
			}
			.disconnect {
				background: #dc3545;
			}
			.disconnect:hover {
				background: #c82333;
			}
			input {
				padding: 8px;
				border: 1px solid #ccc;
				border-radius: 4px;
				margin: 5px 0;
				width: calc(100% - 20px);
			}
			#messages {
				border: 1px solid #ccc;
				padding: 10px;
				height: 300px;
				overflow-y: auto;
				background: #f9f9f9;
				border-radius: 4px;
				font-family: monospace;
				font-size: 12px;
			}
			.message {
				margin: 5px 0;
				padding: 5px;
				border-left: 3px solid #007bff;
				background: white;
			}
			.status {
				padding: 10px;
				margin: 10px 0;
				border-radius: 4px;
				font-weight: bold;
			}
			.status.connected {
				background: #d4edda;
				color: #155724;
			}
			.status.disconnected {
				background: #f8d7da;
				color: #721c24;
			}
		</style>
	</head>
	<body>
		<h1>WebSocket Topic Server Test</h1>

		<div id="status" class="status disconnected">Status: Disconnected</div>

		<div class="container">
			<div class="section">
				<h3>Subscribe to Topics</h3>
				<input type="text" id="subscribeTopic" placeholder="Enter topic name" value="game-events" />
				<button onclick="subscribe()">Subscribe</button>
				<button onclick="unsubscribe()">Unsubscribe</button>

				<h4>Quick Subscribe:</h4>
				<button onclick="quickSubscribe('game-events')">Game Events</button>
				<button onclick="quickSubscribe('player-stats')">Player Stats</button>
				<button onclick="quickSubscribe('chat-messages')">Chat</button>
			</div>

			<div class="section">
				<h3>Publish Message</h3>
				<input type="text" id="publishTopic" placeholder="Topic" value="game-events" />
				<input
					type="text"
					id="publishMessage"
					placeholder="Message (JSON or text)"
					value='{"event": "test", "value": 123}'
				/>
				<button onclick="publish()">Publish</button>

				<h4>Quick Publish:</h4>
				<button onclick="quickPublish('game-events', {event: 'match-start'})">Start Match</button>
				<button onclick="quickPublish('player-stats', {player: 'John', score: 100})">
					Send Stats
				</button>
			</div>
		</div>

		<div class="section">
			<h3>Messages</h3>
			<button onclick="clearMessages()">Clear</button>
			<button class="disconnect" onclick="disconnect()">Disconnect</button>
			<button onclick="reconnect()">Reconnect</button>
			<div id="messages"></div>
		</div>

		<script src="websocket-client.js"></script>
		<script>
			let ws;

			// Initialize WebSocket connection
			function init() {
				ws = new TopicWebSocket('ws://localhost:9842/ws');

				ws.on('connected', () => {
					updateStatus(true);
					addMessage('System', 'Connected to WebSocket server');
				});

				ws.on('disconnected', () => {
					updateStatus(false);
					addMessage('System', 'Disconnected from WebSocket server');
				});

				ws.on('message', (topic, data) => {
					addMessage(topic, data);
				});

				ws.on('error', (error) => {
					addMessage('Error', error);
				});
			}

			function updateStatus(connected) {
				const statusEl = document.getElementById('status');
				if (connected) {
					statusEl.className = 'status connected';
					statusEl.textContent = 'Status: Connected';
				} else {
					statusEl.className = 'status disconnected';
					statusEl.textContent = 'Status: Disconnected';
				}
			}

			function subscribe() {
				const topic = document.getElementById('subscribeTopic').value;
				if (topic) {
					ws.subscribe(topic);
					addMessage('System', `Subscribing to: ${topic}`);
				}
			}

			function unsubscribe() {
				const topic = document.getElementById('subscribeTopic').value;
				if (topic) {
					ws.unsubscribe(topic);
					addMessage('System', `Unsubscribing from: ${topic}`);
				}
			}

			function quickSubscribe(topic) {
				ws.subscribe(topic);
				addMessage('System', `Subscribing to: ${topic}`);
			}

			function publish() {
				const topic = document.getElementById('publishTopic').value;
				const message = document.getElementById('publishMessage').value;

				if (topic && message) {
					try {
						const data = JSON.parse(message);
						ws.publish(topic, data);
					} catch (e) {
						// If not valid JSON, send as string
						ws.publish(topic, { message });
					}
					addMessage('System', `Publishing to ${topic}`);
				}
			}

			function quickPublish(topic, data) {
				ws.publish(topic, data);
				addMessage('System', `Publishing to ${topic}: ${JSON.stringify(data)}`);
			}

			function addMessage(topic, data) {
				const messagesDiv = document.getElementById('messages');
				const messageEl = document.createElement('div');
				messageEl.className = 'message';

				const timestamp = new Date().toLocaleTimeString();
				const dataStr = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;

				messageEl.innerHTML = `<strong>[${timestamp}] ${topic}:</strong><br>${dataStr}`;
				messagesDiv.appendChild(messageEl);
				messagesDiv.scrollTop = messagesDiv.scrollHeight;
			}

			function clearMessages() {
				document.getElementById('messages').innerHTML = '';
			}

			function disconnect() {
				ws.close();
			}

			function reconnect() {
				init();
			}

			// Initialize on page load
			init();
		</script>
	</body>
</html>
