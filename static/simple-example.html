<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Simple WebSocket Example</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 600px;
				margin: 50px auto;
				padding: 20px;
			}
			.status {
				padding: 10px;
				margin: 10px 0;
				border-radius: 4px;
				font-weight: bold;
			}
			.connected {
				background: #d4edda;
				color: #155724;
			}
			.disconnected {
				background: #f8d7da;
				color: #721c24;
			}
			button {
				background: #007bff;
				color: white;
				border: none;
				padding: 10px 20px;
				border-radius: 4px;
				cursor: pointer;
				margin: 5px;
			}
			button:hover {
				background: #0056b3;
			}
			#log {
				border: 1px solid #ccc;
				padding: 10px;
				height: 300px;
				overflow-y: auto;
				background: #f9f9f9;
				font-family: monospace;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<h1>Simple WebSocket Demo</h1>

		<div id="status" class="status disconnected">Disconnected</div>

		<div>
			<button onclick="testPublish()">Send Test Message</button>
			<button onclick="clearLog()">Clear Log</button>
		</div>

		<h3>Message Log:</h3>
		<div id="log"></div>

		<!-- Include the WebSocket client library -->
		<script src="websocket-client.js"></script>

		<script>
			// Initialize WebSocket connection
			const ws = new TopicWebSocket('ws://localhost:9842/ws');

			ws.on('connected', () => {
				updateStatus(true);
				log('Connected to WebSocket server');

				// Subscribe to a test topic
				ws.subscribe('test-topic');
				log('Subscribed to "test-topic"');
			});

			ws.on('disconnected', () => {
				updateStatus(false);
				log('Disconnected from server');
			});

			ws.on('message', (topic, data) => {
				log(`Received on "${topic}": ${JSON.stringify(data, null, 2)}`);
			});

			ws.on('error', (error) => {
				log(`Error: ${error}`);
			});

			function updateStatus(connected) {
				const el = document.getElementById('status');
				el.className = connected ? 'status connected' : 'status disconnected';
				el.textContent = connected ? 'Connected' : 'Disconnected';
			}

			function log(message) {
				const el = document.getElementById('log');
				const time = new Date().toLocaleTimeString();
				el.innerHTML += `[${time}] ${message}\n`;
				el.scrollTop = el.scrollHeight;
			}

			function clearLog() {
				document.getElementById('log').innerHTML = '';
			}

			function testPublish() {
				ws.publish('test-topic', {
					message: 'Hello from the browser!',
					timestamp: Date.now(),
					random: Math.random()
				});
				log('Published test message');
			}
		</script>
	</body>
</html>
