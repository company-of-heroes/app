name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Prevent overlapping runs from racing on the Version Packages PR.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When changesets exist on main, this opens/updates a "Version Packages" PR
      # that runs `pnpm version-packages` (bumps package.json, tauri.conf.json and
      # Cargo.toml, prepends CHANGELOG.md and removes the consumed changesets).
      # Merging that PR is what actually releases the new version.
      - name: Create Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
