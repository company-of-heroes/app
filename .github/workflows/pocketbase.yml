name: Build and Release PocketBase

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.changes.outputs.build }}
      deploy: ${{ steps.changes.outputs.deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect PocketBase changes
        id: changes
        run: |
          build=false
          deploy=false

          if git diff --name-only HEAD^ HEAD | grep -q '^packages/pocketbase/'; then
            build=true
          fi

          if git diff --name-only HEAD^ HEAD | grep -q '^packages/pocketbase/package.json$'; then
            previous=$(git show HEAD^:packages/pocketbase/package.json | jq -r .version)
            current=$(jq -r .version packages/pocketbase/package.json)

            if [ "$previous" != "$current" ]; then
              deploy=true
            fi
          fi

          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

  build-pocketbase:
    needs: detect
    if: needs.detect.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/pocketbase
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push PocketBase Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./packages/pocketbase
          file: ./packages/pocketbase/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        continue-on-error: true
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/pocketbase
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy-pocketbase:
    needs: detect
    if: needs.detect.outputs.deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dockhand deployment
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          curl -fsSL -X POST \
            "https://dashboard.codeit.website/api/git/stacks/4/webhook?secret=${DEPLOY_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
