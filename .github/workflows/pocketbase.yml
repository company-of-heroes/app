name: Build and Release PocketBase

on:
  push:
    branches:
      - main
    paths:
      - 'pocketbase/**'
      - '.github/workflows/pocketbase.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-pocketbase:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/pocketbase
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push PocketBase Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./pocketbase
          file: ./pocketbase/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        continue-on-error: true
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/pocketbase
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Trigger deployment
        if: github.ref == 'refs/heads/master'
        run: |
          curl -fsSL -X POST https://deploy.codeit.website/api/deploy/compose/KyP48VE46_ojKp6Ya7fvO
