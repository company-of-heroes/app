<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Company of Heroes Companion - created by Fknoobs</title>
		<style>
			#boot-splash {
				position: fixed;
				inset: 0;
				z-index: 2147483647;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1.25rem;
				background: oklch(29% 0.003 285);
				color: oklch(66% 0.005 285);
				font-family: system-ui, -apple-system, sans-serif;
				font-size: 1rem;
				font-weight: 600;
			}

			#boot-splash .boot-splash-spinner {
				width: 48px;
				height: 48px;
				border-radius: 9999px;
				border: 2.5px solid oklch(41% 0.004 285 / 0.55);
				border-top-color: oklch(0.88 0.11 80);
				animation: boot-spin 1.5s linear infinite;
			}

			#boot-splash .boot-splash-label {
				margin: 0;
			}

			#boot-splash .boot-splash-dots {
				display: flex;
				gap: 0.4rem;
				margin: -0.25rem 0 0;
				padding: 0;
				list-style: none;
			}

			#boot-splash .boot-splash-dots li {
				width: 0.35rem;
				height: 0.35rem;
				border-radius: 9999px;
				background: oklch(0.88 0.11 80);
				opacity: 0.35;
				animation: boot-dot-pulse 1.2s ease-in-out infinite;
			}

			#boot-splash .boot-splash-dots li:nth-child(2) {
				animation-delay: 0.2s;
			}

			#boot-splash .boot-splash-dots li:nth-child(3) {
				animation-delay: 0.4s;
			}

			@keyframes boot-spin {
				to {
					transform: rotate(360deg);
				}
			}

			@keyframes boot-dot-pulse {
				0%,
				100% {
					opacity: 0.25;
					transform: scale(1);
				}

				50% {
					opacity: 1;
					transform: scale(1.15);
				}
			}

			@media (prefers-reduced-motion: reduce) {
				#boot-splash .boot-splash-spinner,
				#boot-splash .boot-splash-dots li {
					animation: none;
				}

				#boot-splash .boot-splash-dots li {
					opacity: 0.6;
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body class="overflow-hidden text-white">
		<div id="boot-splash" aria-live="polite" aria-busy="true">
			<div class="boot-splash-spinner" aria-hidden="true"></div>
			<p class="boot-splash-label">Starting...</p>
			<ul class="boot-splash-dots" aria-hidden="true">
				<li></li>
				<li></li>
				<li></li>
			</ul>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if (!/\/splashscreen\/?$/.test(location.pathname)) {
				document.getElementById('boot-splash')?.remove();
			}
		</script>
	</body>
</html>
